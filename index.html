<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Summarizer</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-3xl">

        <h1 class="text-4xl font-bold text-gray-800 mb-2">
            AI Text Summarizer
        </h1>

        <p class="text-gray-500 mb-6">
            Upload a PDF or paste text for a professional summary.
        </p>

        <!-- Text Area -->
        <textarea
            id="textInput"
            rows="8"
            class="w-full border border-gray-300 rounded-xl p-4 outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Paste your text here..."
        ></textarea>

        <!-- File Upload -->
        <div class="flex flex-col md:flex-row gap-4 mt-4">

            <input
                type="file"
                id="fileInput"
                accept=".pdf"
                class="block w-full text-sm text-gray-600
                file:mr-4 file:py-2 file:px-4
                file:rounded-full file:border-0
                file:text-sm file:font-semibold
                file:bg-blue-50 file:text-blue-700
                hover:file:bg-blue-100"
            >

        </div>

        <!-- Button -->
        <button
            onclick="generateSummary()"
            id="generateBtn"
            class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition"
        >
            Generate Summary
        </button>

        <!-- Result -->
        <div
            id="resultContainer"
            class="hidden mt-8 bg-blue-50 border border-blue-200 rounded-xl p-6"
        >

            <h2 class="text-xl font-bold text-blue-800 mb-3">
                ✨ Summary Result
            </h2>

            <p
                id="summaryText"
                class="text-gray-700 whitespace-pre-line leading-relaxed"
            ></p>

        </div>

    </div>

    <script>

        async function generateSummary() {

            const text = document.getElementById("textInput").value;

            const file = document.getElementById("fileInput").files[0];

            const button = document.getElementById("generateBtn");

            const resultContainer =
                document.getElementById("resultContainer");

            const summaryText =
                document.getElementById("summaryText");

            // Validation
            if (!text && !file) {

                alert("Please enter text or upload a PDF.");

                return;
            }

            // Loading State
            button.innerText = "Processing...";

            button.disabled = true;

            const formData = new FormData();

            if (text) {
                formData.append("text", text);
            }

            if (file) {
                formData.append("file", file);
            }

            try {

                // Your Vercel Backend URL
                const response = await fetch(
                    "/summarize",
                    {
                        method: "POST",
                        body: formData
                    }
                );

                const data = await response.json();

                resultContainer.classList.remove("hidden");

                summaryText.innerText = data.summary;

            }
            catch (error) {

                alert(
                    "Connection failed. Check Vercel deployment logs."
                );

            }
            finally {

                button.innerText = "Generate Summary";

                button.disabled = false;
            }
        }

    </script>

</body>

</html>
